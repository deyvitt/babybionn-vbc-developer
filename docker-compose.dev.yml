# version: '3.8'
services:
  babybionn-app:
    build: .
    container_name: babybionn-app-dev
    ports:
      - "8002:8002"
    command: python main.py
    # don't use this - uvicorn main:app --host 0.0.0.0 --port 8002 --reload      
    # network_mode: bridge  # or "host"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env  
    # No memory limits - image is small now
    volumes:
      - ./:/app
      # Mount knowledge directory for both reading and writing
      #- ./knowledge_base:/app/knowledge_base
      # Optional: Mount a separate directory for learned/processed knowledge
      #- ./learned_knowledge:/app/learned_knowledge
      
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app:/app/neuron:${PYTHONPATH:-}
      - LLM_PROVIDER=deepseek           # Options: mock, openai, deepseek, anthropic, custom
      - LLM_MODEL=deepseek-chat
      - LLM_TEMPERATURE=0.7
      - LLM_MAX_TOKENS=1000
      # Add these environment variables for knowledge paths
      - KNOWLEDGE_BASE_PATH=/app/knowledge_base
      - LEARNED_KNOWLEDGE_PATH=/app/learned_knowledge
    restart: unless-stopped
