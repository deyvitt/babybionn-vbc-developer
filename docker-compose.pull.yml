version: '3.8'
services:
  babybionn-app:
    image: yourusername/babybionn:latest
    ports:
      - "8002:8002"
      - "9000:9000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - babybionn_data:/app/data
    restart: unless-stopped

volumes:
  babybionn_data:
