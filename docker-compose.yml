# docker-compose.yml
# version: '3.8'

services:
  babybionn-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    container_name: babybionn-app
    hostname: babybionn
    ports:
      - "8001:8001"
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - babybionn_knowledge:/app/knowledge_bases
      - babybionn_models:/app/models
      - babybionn_checkpoints:/app/checkpoints
      - babybionn_logs:/app/logs
      - babybionn_cache:/app/cache
      - babybionn_patterns:/app/mesh_patterns
      - ./knowledge_bases:/app/knowledge_bases
      - ./models:/app/models
      - ./cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - PYTHONHASHSEED=42
      - TRANSFORMERS_CACHE=/app/models
      - HF_HOME=/app/models
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - WORKERS=2
      - NEURAL_MESH_ENABLED=true
      - MESH_LEARNING_RATE=0.1
    restart: unless-stopped
    mem_limit: 16g
    mem_reservation: 8g
    cpus: 4.0
    networks:
      - babybionn-network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 1  # FIXED: Single command, no shell script
networks:
  babybionn-network:
    driver: bridge
volumes:
  babybionn_knowledge:
  babybionn_models:
  babybionn_checkpoints:
  babybionn_logs:
  babybionn_cache:
  babybionn_patterns:
